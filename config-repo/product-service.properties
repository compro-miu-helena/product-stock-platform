server.port=8901
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8502
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.query-passing=true
spring.cloud.consul.discovery.health-check-url=http://host.docker.internal:${server.port}/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.health-check-timeout=5s
spring.cloud.consul.discovery.health-check-critical-timeout=30s
spring.cloud.openfeign.micrometer.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
resilience4j.circuitbreaker.instances.stockService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.stockService.sliding-window-size=2
resilience4j.circuitbreaker.instances.stockService.minimum-number-of-calls=2
resilience4j.circuitbreaker.instances.stockService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.stockService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.stockService.permitted-number-of-calls-in-half-open-state=1
