version: "3.8"

services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    networks:
      - consul-net

  mongo:
    image: mongo:8.0
    container_name: mongo
    ports:
      - "27017:27017"
    networks:
      - consul-net

  consul-server-1:
    image: hashicorp/consul:latest
    container_name: consul-server-1
    command: agent -server -bootstrap-expect=3 -client=0.0.0.0 -ui -retry-join=consul-server-2 -retry-join=consul-server-3
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    networks:
      - consul-net

  consul-server-2:
    image: hashicorp/consul:latest
    container_name: consul-server-2
    command: agent -server -client=0.0.0.0 -ui -retry-join=consul-server-1 -retry-join=consul-server-3
    ports:
      - "8501:8500"
    networks:
      - consul-net

  consul-server-3:
    image: hashicorp/consul:latest
    container_name: consul-server-3
    command: agent -server -client=0.0.0.0 -ui -retry-join=consul-server-1 -retry-join=consul-server-2
    ports:
      - "8502:8500"
    networks:
      - consul-net

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      - consul-server-1
      - consul-server-2
      - consul-server-3
    environment:
      SPRING_CLOUD_CONSUL_HOST: consul-server-1
      SPRING_CLOUD_CONSUL_PORT: 8500
      SPRING_CLOUD_CONSUL_DISCOVERY_HEALTH_CHECK_URL: http://api-gateway:8080/actuator/health
    ports:
      - "8080:8080"
    networks:
      - consul-net

networks:
  consul-net:
    driver: bridge
