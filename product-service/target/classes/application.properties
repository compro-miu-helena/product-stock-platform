spring.application.name=product-service
spring.config.import=optional:configserver:http://localhost:8888

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=lab.productservice.model
spring.kafka.consumer.properties.spring.json.value.default.type=lab.productservice.model.Order
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.kafka.orders-topic=orders-topic
app.kafka.publish-sample-orders-on-startup=true
app.kafka.consumer.default-group-id=order-default-group
app.kafka.consumer.from-beginning-group-id=order-from-beginning-group-${random.uuid}
app.kafka.consumer.shared-group-id=order-shared-group
