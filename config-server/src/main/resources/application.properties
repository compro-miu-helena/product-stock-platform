server.port=8888
spring.application.name=config-server
management.endpoints.web.exposure.include=health,info
spring.cloud.config.server.git.clone-on-start=true
spring.cloud.config.server.git.default-label=${CONFIG_LABEL:main}
spring.cloud.config.server.git.search-paths=${CONFIG_SEARCH_PATHS:product-stock-microservices-platform/config-repo}
spring.cloud.config.server.git.uri=${CONFIG_GIT_URI:https://github.com/compro-miu-helena/CS590.git}
